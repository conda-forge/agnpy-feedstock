{% set name = "agnpy" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 2bac658cb99422ff7e0563818c8bb2f0ca073482f16f08f4a939e2c7bc61bcae

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.8
  run:
    - astropy >=4
    - matplotlib-base
    - numpy >=1.17
    - python >=3.8
    - scipy >=1.2

test:
  imports:
    - agnpy

about:
  home: https://github.com/cosimoNigro/agnpy
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Modelling jetted Active Galactic Nuclei radiative processes with python
  description: |
    agnpy focuses on the numerical computation of the photon spectra produced
    by leptonic radiative processes in jetted Active Galactic Nuclei (AGN).
  doc_url: https://agnpy.readthedocs.io/
  dev_url: https://github.com/cosimoNigro/agnpy

extra:
  recipe-maintainers:
    - mwcraig
